<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGame — Intellektual Viktorina</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Trebuchet MS','Segoe UI',sans-serif;background:#071028;min-height:100vh;}
.scroll-thin::-webkit-scrollbar{width:4px;}
.scroll-thin::-webkit-scrollbar-track{background:transparent;}
.scroll-thin::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}
.slider-blue{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;width:100%;}
.slider-blue::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#3b82f6;border:2px solid #fff;cursor:pointer;box-shadow:0 0 8px rgba(59,130,246,0.7);}
.slider-blue::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#3b82f6;border:2px solid #fff;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.6;}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 25px rgba(59,130,246,0.35);}50%{box-shadow:0 0 50px rgba(59,130,246,0.65);}}
@keyframes buzzPulse{0%,100%{box-shadow:0 0 50px rgba(239,68,68,0.7);}50%{box-shadow:0 0 80px rgba(239,68,68,1);}}
@keyframes sendPulse{0%,100%{box-shadow:0 0 20px rgba(16,185,129,0.5);}50%{box-shadow:0 0 40px rgba(16,185,129,0.85);}}
@keyframes neonFlash{0%,100%{border-color:rgba(239,68,68,0.4);box-shadow:0 0 20px rgba(239,68,68,0.2);}50%{border-color:rgba(249,115,22,1);box-shadow:0 0 40px rgba(249,115,22,0.6);}}
.btn-menu{transition:background 0.2s,box-shadow 0.2s,transform 0.2s;border:none;outline:none;}
.btn-menu:hover{background:rgba(255,255,255,0.16)!important;box-shadow:0 0 28px rgba(100,180,255,0.3)!important;transform:scale(1.03) translateX(4px)!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── SVG Icons ───────────────────────────────────────────────
const MusicIcon = () => (
  <svg viewBox="0 0 24 24" fill="#fde047" style={{width:26,height:26}}>

  </svg>
);
const CapIcon = () => (
  <svg viewBox="0 0 24 24" fill="#fde047" style={{width:26,height:26}}>
    <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
  </svg>
);
const FolderIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" strokeWidth="2" style={{width:16,height:16}}>
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  </svg>
);
const UserIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" strokeWidth="2" style={{width:16,height:16}}>
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
  </svg>
);
const PlayersIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" strokeWidth="2" style={{width:16,height:16}}>
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>
);
const ChevronDown = ({ open }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
    style={{width:16,height:16,flexShrink:0,transform:open?"rotate(180deg)":"rotate(0)",transition:"transform 0.25s"}}>
    <polyline points="6 9 12 15 18 9"/>
  </svg>
);

// ─── LocalStorage helpers ───────────────────────────────────
const STORAGE_KEY = "sigame_packages";
const DEFAULT_PACKAGE_NAME = "Standart savollar";
const DEFAULT_QUESTIONS = [
  {id:1,topic:"Tarix",q:"O'zbekiston qachon mustaqil bo'ldi?",a:"1991",price:100},
  {id:2,topic:"Geografiya",q:"O'zbekistonning poytaxti qaysi shahar?",a:"Toshkent",price:200},
  {id:3,topic:"Fan",q:"Suv qanday kimyoviy formulaga ega?",a:"H2O",price:100},
  {id:4,topic:"Adabiyot",q:"'O'tkan kunlar' romanini kim yozgan?",a:"Abdulla Qodiriy",price:300},
  {id:5,topic:"Matematika",q:"Kvadrat ildiz 144 dan necha?",a:"12",price:200},
  {id:6,topic:"Tarix",q:"Buyuk Ipak yo'li qaysi mamlakatdan boshlangan?",a:"Xitoy",price:300},
  {id:7,topic:"Geografiya",q:"Dunyodagi eng uzun daryo qaysi?",a:"Nil",price:400},
  {id:8,topic:"Adabiyot",q:"Alisher Navoiy qaysi asrda yashagan?",a:"XV asr",price:400},
  {id:9,topic:"Fan",q:"Yorug'lik tezligi taxminan qancha km/s?",a:"300000",price:500},
  {id:10,topic:"Matematika",q:"Pi soni taxminan qancha?",a:"3.14",price:500},
];
const DEFAULT_PACKAGE = {id:"default", name: DEFAULT_PACKAGE_NAME, questions: DEFAULT_QUESTIONS};

// Packages: [{id, name, questions:[]}]
function loadPackages() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const p = JSON.parse(s); if (p && p.length > 0) return p; }
  } catch(e) {}
  return [DEFAULT_PACKAGE];
}
function savePackages(pkgs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(pkgs)); } catch(e) {}
}
function getPackageById(pkgs, id) {
  return pkgs.find(p=>p.id===id) || pkgs[0];
}
// Legacy migration: if old sigame_questions key exists, migrate it
function migrateOldData() {
  try {
    const old = localStorage.getItem("sigame_questions");
    if (old) {
      const qs = JSON.parse(old);
      if (qs && qs.length > 0) {
        const existing = loadPackages();
        const hasLegacy = existing.find(p=>p.id==="legacy");
        if (!hasLegacy) {
          const migrated = [{id:"legacy", name:"Eski savollar", questions: qs}, ...existing];
          savePackages(migrated);
        }
      }
      localStorage.removeItem("sigame_questions");
    }
  } catch(e) {}
}
migrateOldData();

// ─── Logo ────────────────────────────────────────────────────
function Logo() {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{alignSelf:"flex-start",paddingLeft:4}}><MusicIcon/></div>
          <div style={{display:"flex",gap:4}}>
            {["S","I"].map(l=>(
              <div key={l} style={{width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:900,fontSize:32,color:"#fff",
                border:"2px solid rgba(255,255,255,0.65)",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(4px)"}}>
                {l}
              </div>
            ))}
          </div>
        </div>
        <div style={{width:8}}/>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{alignSelf:"flex-end",paddingRight:4}}><CapIcon/></div>
          <div style={{display:"flex",gap:4}}>
            {["G","A","M","E"].map(l=>(
              <div key={l} style={{width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:900,fontSize:22,color:"#fff",
                border:"2px solid rgba(255,255,255,0.65)",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(4px)"}}>
                {l}
              </div>
            ))}
          </div>
        </div>
      </div>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,letterSpacing:"0.35em",textTransform:"uppercase"}}>
        Intellektual Viktorina
      </p>

  );
}

// ─── Stars background ─────────────────────────────────────────
function Stars() {
  const stars = Array.from({length:20},(_,i)=>({
    w:(Math.sin(i*37)*1+1.5),
    top:((i*53)%100),left:((i*71)%100),
    delay:(i*0.3),dur:(2+i%3)
  }));
  return (
    <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-80,left:-80,width:280,height:280,borderRadius:"50%",
        background:"radial-gradient(circle, rgba(30,80,200,0.35) 0%, transparent 70%)",filter:"blur(50px)"}}/>
      <div style={{position:"absolute",bottom:-60,right:-60,width:300,height:300,borderRadius:"50%",
        background:"radial-gradient(circle, rgba(0,120,255,0.25) 0%, transparent 70%)",filter:"blur(60px)"}}/>
      {stars.map((s,i)=>(
        <div key={i} style={{position:"absolute",borderRadius:"50%",background:"#fff",
          width:s.w,height:s.w,top:s.top+"%",left:s.left+"%",
          opacity:0.2,animation:`twinkle ${s.dur}s ease-in-out infinite`,animationDelay:s.delay+"s"}}/>
      ))}
    </div>
  );
}

// ─── MAIN MENU ────────────────────────────────────────────────
const menuItems = [
  {id:1,label:"ONLAYN O'YIN",icon:"🌐",action:"online"},
  {id:2,label:"YAKKALIK O'YIN",icon:"🎮",action:"solo"},
  {id:3,label:"PIN-KOD ORQALI KIRISH",icon:"🔑",action:"pin"},
  {id:4,label:"QANDAY O'YNAYMAN?",icon:"❓",action:"help"},
  {id:5,label:"SAVOL MUHARRIRI",icon:"✏️",action:"editor"},
];

function MainMenu({ onAction }) {
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setLoaded(true),80);return()=>clearTimeout(t);},[]);
  return (
    <div style={{minHeight:"100vh",width:"100%",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",
      padding:"40px 16px",
      background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 40%,#0a2a6e 70%,#0c1f5a 100%)"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:10,display:"flex",flexDirection:"column",
        alignItems:"center",width:"100%",maxWidth:480,gap:32,
        opacity:loaded?1:0,transform:loaded?"translateY(0)":"translateY(-24px)",transition:"all 0.7s ease"}}>
        <Logo/>
        <nav style={{display:"flex",flexDirection:"column",alignItems:"center",width:"100%",gap:10}}>
          {menuItems.map((item,idx)=>(
            <button key={item.id} className="btn-menu"
              onClick={()=>onAction(item.action)}
              style={{width:"100%",maxWidth:400,display:"flex",alignItems:"center",gap:16,
                padding:"14px 24px",textAlign:"left",
                background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.18)",
                borderRadius:12,backdropFilter:"blur(10px)",
                opacity:loaded?1:0,
                animation:loaded?`fadeUp 0.5s ease ${idx*0.07}s both`:"none",
                cursor:"pointer"}}>
              <span style={{fontSize:18}}>{item.icon}</span>
              <span style={{color:"#fff",fontWeight:700,letterSpacing:"0.13em",fontSize:13,flex:1}}>{item.label}</span>
              <span style={{color:"rgba(150,210,255,0.7)",fontSize:12}}>▶</span>
            </button>
          ))}
        </nav>
        <p style={{color:"rgba(255,255,255,0.2)",fontSize:11,letterSpacing:"0.2em"}}>v2.0.0 · SIGame Uzbek Edition</p>
      </div>
    </div>
  );
}

// ─── HELPER COMPONENTS ────────────────────────────────────────
function Card({label,icon,hint,children}){
  return(
    <div style={{borderRadius:12,padding:16,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        {icon}
        <span style={{color:"rgba(255,255,255,0.8)",fontSize:13,fontWeight:700}}>{label}</span>
        {hint&&<span style={{color:"rgba(255,255,255,0.22)",fontSize:11}}>— {hint}</span>}
      </div>
      {children}
    </div>
  );
}

function DDMenu({value,options,open,onToggle,onSelect,capitalize}){
  return(
    <div style={{position:"relative",width:"100%"}} data-dd>
      <button data-dd onClick={onToggle} style={{width:"100%",display:"flex",alignItems:"center",
        justifyContent:"space-between",padding:"10px 14px",borderRadius:10,fontSize:14,
        color:"#fff",fontWeight:600,cursor:"pointer",transition:"all 0.2s",
        background:open?"rgba(37,99,235,0.22)":"rgba(255,255,255,0.08)",
        border:open?"1px solid rgba(100,160,255,0.5)":"1px solid rgba(255,255,255,0.12)",
        textTransform:capitalize?"capitalize":"none"}}>
        <span>{value}</span><ChevronDown open={open}/>
      </button>
      {open&&(
        <div data-dd style={{position:"absolute",left:0,right:0,zIndex:100,top:"calc(100% + 4px)",
          borderRadius:12,overflow:"hidden",
          background:"#0d1b4b",border:"1px solid rgba(100,160,255,0.3)",boxShadow:"0 16px 40px rgba(0,0,0,0.6)"}}>
          {options.map(opt=>(
            <button key={opt} data-dd onClick={()=>onSelect(opt)} style={{width:"100%",textAlign:"left",
              padding:"10px 14px",fontSize:13,cursor:"pointer",transition:"background 0.15s",
              color:opt===value?"#fff":"rgba(255,255,255,0.55)",
              background:opt===value?"rgba(37,99,235,0.3)":"transparent",
              borderBottom:"1px solid rgba(255,255,255,0.05)",
              textTransform:capitalize?"capitalize":"none"}}>
              {opt}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function CBRow({checked,onChange,label,hint}){
  return(
    <div style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}} onClick={()=>onChange(!checked)}>
      <div style={{flexShrink:0,width:20,height:20,borderRadius:4,display:"flex",
        alignItems:"center",justifyContent:"center",marginTop:2,transition:"all 0.2s",
        background:checked?"#2563eb":"rgba(255,255,255,0.08)",
        border:checked?"1px solid #3b82f6":"1px solid rgba(255,255,255,0.2)",
        boxShadow:checked?"0 0 10px rgba(37,99,235,0.5)":"none"}}>
        {checked&&<svg viewBox="0 0 12 10" fill="none" style={{width:12,height:10}}>
          <polyline points="1,5 4.5,8.5 11,1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>}
      </div>
      <div>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:13,fontWeight:500}}>{label}</p>
        {hint&&<p style={{color:"rgba(255,255,255,0.28)",fontSize:11,marginTop:2}}>{hint}</p>}
      </div>
    </div>
  );
}

// ─── ROOM SETTINGS MODAL ──────────────────────────────────────
const defaultSettings={
  questionPackage:"",myRole:"o'yinchi",playersCount:3,
  gameType:"Klassik",controlledGame:false,
  playAllQuestions:false,falseStarts:true,finalRound:false,
  timeQuestionSelect:30,timeTopicSelect:20,timePassQuestion:15,
  timePressButton:10,timeAnswerAfterPress:25,timeSpecialQuestion:40,
  timeAllAnswer:30,timeBidding:15,timeHostDecision:20,
};

function XonaTab({settings,update,openDD,setOpenDD}){
  const [allPkgs, setAllPkgs] = React.useState(()=>loadPackages());
  React.useEffect(()=>{ setAllPkgs(loadPackages()); },[openDD]);
  const pkgOptions = allPkgs.map(p=>p.name);
  const roles=["o'yinchi","boshlovchi","tomoshabin"];
  const pct=((settings.playersCount-2)/10)*100;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card label="Savollar paketi" icon={<FolderIcon/>} hint="Savol to'plamini tanlang">
        <DDMenu value={settings.questionPackage || allPkgs[0]?.name || "—"} options={pkgOptions}
          open={openDD==="pkg"} onToggle={()=>setOpenDD(p=>p==="pkg"?null:"pkg")}
          onSelect={v=>{update("questionPackage",v);setOpenDD(null);}}/>
        {allPkgs.length===1&&allPkgs[0].id==="default"&&(
          <p style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.3)"}}>
            💡 Yangi paket qo'shish uchun → Savol Muharririga o'ting
          </p>
        )}
      </Card>
      <Card label="Mening rolim" icon={<UserIcon/>} hint="O'yindagi rolingiz">
        <DDMenu value={settings.myRole} options={roles} capitalize
          open={openDD==="role"} onToggle={()=>setOpenDD(p=>p==="role"?null:"role")}
          onSelect={v=>{update("myRole",v);setOpenDD(null);}}/>
      </Card>
      <Card label="O'yinchilar soni" icon={<PlayersIcon/>} hint="2 dan 12 gacha">
        <div style={{display:"flex",alignItems:"center",gap:14,width:"100%"}}>
          <div style={{flexShrink:0,width:48,height:44,display:"flex",alignItems:"center",
            justifyContent:"center",fontWeight:900,fontSize:20,color:"#fff",borderRadius:10,
            background:"linear-gradient(135deg,#1e40af,#2563eb)",boxShadow:"0 0 14px rgba(37,99,235,0.55)"}}>
            {settings.playersCount}
          </div>
          <div style={{flex:1}}>
            <input type="range" min={2} max={12} value={settings.playersCount}
              onChange={e=>update("playersCount",Number(e.target.value))}
              className="slider-blue"
              style={{background:`linear-gradient(to right,#2563eb 0%,#2563eb ${pct}%,rgba(255,255,255,0.15) ${pct}%,rgba(255,255,255,0.15) 100%)`}}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>2</span>
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>12</span>
            </div>
          </div>
        </div>
      </Card>
    </div>
  );
}

function QoidalarTab({settings,update}){
  const types=["Klassik","Tez o'yin","Jamoa o'yini","Turnir"];
  const hints={"Klassik":"An'anaviy qoidalar.","Tez o'yin":"Qisqa vaqt, tez sur'at.","Jamoa o'yini":"Jamoalar birgalikda.","Turnir":"Bosqichli turnir."};
  const rules=[

  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card label="O'yin turi" hint="Qoidalar to'plamini tanlang">

            <div key={t} onClick={()=>update("gameType",t)}

                background:settings.gameType===t?"rgba(37,99,235,0.2)":"rgba(255,255,255,0.04)",
                border:settings.gameType===t?"1px solid rgba(37,99,235,0.5)":"1px solid transparent"}}>
              <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid",flexShrink:0,
                borderColor:settings.gameType===t?"#3b82f6":"rgba(255,255,255,0.3)",
                background:settings.gameType===t?"#2563eb":"transparent",transition:"all 0.15s"}}/>
              <div>
                <p style={{color:"rgba(255,255,255,0.85)",fontSize:13,fontWeight:600}}>{t}</p>
                <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:1}}>{hints[t]}</p>
              </div>

          ))}
        </div>
      </Card>
      <Card label="Qoidalar" hint="Maxsus o'yin sozlamalari">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {rules.map(r=><CBRow key={r.key} checked={settings[r.key]} onChange={v=>update(r.key,v)} label={r.label} hint={r.hint}/>)}
        </div>
      </Card>

}

function VaqtTab({settings,update}){
  const sliders=[
    {key:"timeQuestionSelect",label:"Savol tanlash",max:60},
    {key:"timeTopicSelect",label:"Mavzu tanlash",max:60},
    {key:"timePassQuestion",label:"Savolni o'tkazib yuborish",max:30},
    {key:"timePressButton",label:"Tugma bosish",max:30},
    {key:"timeAnswerAfterPress",label:"Javob vaqti (bosish keyin)",max:60},
    {key:"timeSpecialQuestion",label:"Maxsus savol",max:90},
    {key:"timeAllAnswer",label:"Hammaning javobi",max:60},
    {key:"timeBidding",label:"Stavka vaqti",max:30},
    {key:"timeHostDecision",label:"Boshlovchi qarori",max:40},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {sliders.map(s=>{
        const pct=((settings[s.key]-5)/(s.max-5))*100;
        return(
          <div key={s.key} style={{borderRadius:12,padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.7)",fontWeight:600}}>{s.label}</span>
              <span style={{fontSize:13,fontWeight:900,color:"#fde047",minWidth:40,textAlign:"right"}}>{settings[s.key]}s</span>
            </div>
            <input type="range" min={5} max={s.max} step={5} value={settings[s.key]}

const APPEAL_TIMER = 30;

function useCountdown(active, seconds, onExpire) {
  const [rem, setRem] = useState(seconds);
  const ref = useRef(null);
  useEffect(() => {
    if (!active) { setRem(seconds); return; }
    setRem(seconds);
    ref.current = setInterval(() => {
      setRem(p => {
        if (p <= 1) { clearInterval(ref.current); onExpire?.(); return 0; }
        return p - 1;
      });
    }, 1000);
    return () => clearInterval(ref.current);
  }, [active, seconds]);
  return rem;
}

function GameBoard({ onBack, selectedPackageName, hostPlayers }) {
  const allPkgs = loadPackages();
  const activePkg = allPkgs.find(p=>p.name===selectedPackageName) || allPkgs[0];
  const allQuestions = activePkg ? activePkg.questions : DEFAULT_QUESTIONS;
  const [usedIds, setUsedIds] = useState([]);
  const [currentQ, setCurrentQ] = useState(null);
  const initPlayers = hostPlayers && hostPlayers.length > 0
    ? hostPlayers.map((p,i)=>({id:p.id||i+1,name:p.name,score:0}))
    : [{id:1,name:"ALI",score:1000},{id:2,name:"VALI",score:800},{id:3,name:"SAMI",score:600}];
  const [players, setPlayers] = useState(initPlayers);
  const [isHost] = useState(true);
  const [currentPlayer] = useState({id:1,name:"ALI"});
  const [qOpen, setQOpen] = useState(false);
  const [buzzed, setBuzzed] = useState(null);
  const [hasTurn, setHasTurn] = useState(false);
  const [answerText, setAnswerText] = useState("");
  const [submitted, setSubmitted] = useState(null);
  const [showAppeal, setShowAppeal] = useState(false);
  const [appealVote, setAppealVote] = useState(null);
  const [toast, setToast] = useState(null);
  const [voteYes, setVoteYes] = useState(0);
  const [voteNo, setVoteNo] = useState(0);
  const [timerActive, setTimerActive] = useState(false);
  const [myVoted, setMyVoted] = useState(false);
  const [history, setHistory] = useState([]);

  const onExpire = useCallback(() => {
    if (!myVoted && appealVote) { setVoteNo(v=>v+1); setMyVoted(true); }
    setTimerActive(false);
  }, [myVoted, appealVote]);

  const timerRem = useCountdown(timerActive, APPEAL_TIMER, onExpire);
  const timerColor = timerRem > 15 ? "green" : timerRem > 7 ? "yellow" : "red";
  const timerPct = (timerRem / APPEAL_TIMER) * 100;

  const openQ = () => {
    const remaining = allQuestions.filter(q=>!usedIds.includes(q.id));
    const pool = remaining.length > 0 ? remaining : allQuestions;
    const picked = pool[Math.floor(Math.random()*pool.length)];
    setCurrentQ(picked ? {text:picked.q, answer:picked.a, price:picked.price, topic:picked.topic, id:picked.id} : null);
    if (picked && remaining.length > 0) setUsedIds(p=>[...p, picked.id]);
    else if (remaining.length === 0) setUsedIds([picked?.id].filter(Boolean));
    setQOpen(true); setBuzzed(null); setHasTurn(false); setAnswerText(""); setSubmitted(null); setShowAppeal(false);
  };
  const closeQ = () => { setQOpen(false); setBuzzed(null); setHasTurn(false); setAnswerText(""); setSubmitted(null); setShowAppeal(false); };

  const pressBuzzer = () => {
    if (buzzed) return;
    setBuzzed(currentPlayer.id);
    setHasTurn(true);
    setAnswerText("");
  };
  const sendAnswer = () => {
    if (!answerText.trim() || submitted) return;
    setSubmitted({playerId:currentPlayer.id, playerName:currentPlayer.name, answer:answerText.trim()});
    setHasTurn(false);
  };

  const handleDecision = (correct) => {
    if (!submitted || !currentQ) return;
    setPlayers(prev=>prev.map(p=>p.id===submitted.playerId?{...p,score:p.score+(correct?currentQ.price:-currentQ.price)}:p));
    if (!correct && submitted.playerId===currentPlayer.id) {
      setShowAppeal(true);
    } else { closeQ(); }
  };

  const triggerAppeal = () => {
    setShowAppeal(false);
    setAppealVote({playerName:currentPlayer.name, answer:submitted.answer});
    setVoteYes(0); setVoteNo(0); setMyVoted(false); setTimerActive(true);
    setHistory(prev=>[{id:Date.now(),playerName:currentPlayer.name,answer:submitted.answer,status:"kutilmoqda",yes:0,no:0},...prev]);
  };

  const submitVote = (approve) => {
    setMyVoted(true);
    if (approve) setVoteYes(v=>v+1); else setVoteNo(v=>v+1);
  };

  const resolveAppeal = (accepted) => {
    if (accepted && currentQ) {
      setPlayers(prev=>prev.map(p=>p.id===currentPlayer.id?{...p,score:p.score+currentQ.price}:p));
      setToast("⚠️ Shikoyat qabul qilindi! Ballar tiklandi.");
    } else {
      setToast("❌ Shikoyat rad etildi.");
    }
    setHistory(prev=>prev.map((h,i)=>i===0?{...h,status:accepted?"qabul":"rad",yes:voteYes,no:voteNo}:h));
    setAppealVote(null); setTimerActive(false);
    if (accepted) closeQ();
    setTimeout(()=>setToast(null),3500);
  };

  const timerNumColor = {green:"#34d399",yellow:"#fde047",red:"#f87171"};
  const buzzedName = buzzed ? (players.find(p=>p.id===buzzed)?.name ?? "—") : null;

  const waitingCount = Math.max(0, totalVoters - voteYes - voteNo);

    <div style={{minHeight:"100vh",padding:24,color:"#fff",

          </p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="si-btn-open" onClick={openQ}>SAVOLNI OCHISH</button>

// ─── SOLO SCREEN ─────────────────────────────────────────────
// Yakkalik o'yin: faqat yozma javob, og'zaki yo'q
function SoloScreen({ onBack }) {
  const [phase, setPhase] = useState("name"); // name | difficulty | playing | result
  const [name, setName] = useState("");
  const [difficulty, setDifficulty] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null); // null | "correct" | "wrong"
  const [score, setScore] = useState(0);
  const [wrongCount, setWrongCount] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const inputRef = useRef(null);

  const DIFFICULTY_MAP = { "Oson": 1, "O'rta": 2, "Qiyin": 3 };
  const TIME_MAP = { "Oson": 30, "O'rta": 20, "Qiyin": 12 };
  const [timeLeft, setTimeLeft] = useState(30);
  const timerRef = useRef(null);

  const startTimer = (sec) => {
    clearInterval(timerRef.current);
    setTimeLeft(sec);
    timerRef.current = setInterval(() => {
      setTimeLeft(p => {
        if (p <= 1) {
          clearInterval(timerRef.current);
          handleTimeout();
          return 0;
        }
        return p - 1;
      });
    }, 1000);
  };

  const handleTimeout = () => {
    setFeedback("timeout");
    setShowAnswer(true);
    setWrongCount(w => w + 1);
  };

  const startGame = (diff) => {
    clearInterval(timerRef.current);
    const allPkgs = loadPackages();
    const allQ = allPkgs.flatMap(p=>p.questions);
    // Shuffle
    const shuffled = [...allQ].sort(() => Math.random() - 0.5);
    setQuestions(shuffled);
    setDifficulty(diff);
    setIdx(0);
    setScore(0);
    setWrongCount(0);
    setFeedback(null);
    setShowAnswer(false);
    setAnswer("");
    setPhase("playing");
    setTimeout(() => startTimer(TIME_MAP[diff]), 100);
  };

  useEffect(() => {
    if (phase === "playing" && !feedback) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [idx, phase, feedback]);

  useEffect(() => () => clearInterval(timerRef.current), []);

  const normalize = s => s.trim().toLowerCase().replace(/[^a-z0-9а-яёўқғҳ\s]/gi, "");

  const checkAnswer = () => {
    if (!answer.trim() || feedback) return;
    clearInterval(timerRef.current);
    const q = questions[idx];
    const correct = normalize(answer) === normalize(q.a) ||
      normalize(q.a).includes(normalize(answer)) ||
      normalize(answer).includes(normalize(q.a));
    setFeedback(correct ? "correct" : "wrong");
    setShowAnswer(true);
    if (correct) setScore(s => s + q.price);
    else setWrongCount(w => w + 1);
  };

  const nextQuestion = () => {
    clearInterval(timerRef.current);
    const next = idx + 1;
    if (next >= questions.length) {
      setPhase("result");
    } else {
      setIdx(next);
      setAnswer("");
      setFeedback(null);
      setShowAnswer(false);
      setTimeout(() => startTimer(TIME_MAP[difficulty]), 100);
    }
  };

  const timerPct = (timeLeft / TIME_MAP[difficulty]) * 100;
  const timerCol = timeLeft > TIME_MAP[difficulty] * 0.6 ? "#10b981" : timeLeft > TIME_MAP[difficulty] * 0.3 ? "#f59e0b" : "#ef4444";

  if (phase === "name") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 50%,#071028 100%)",padding:24,position:"relative"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:420,
        background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",
        borderRadius:24,padding:36,backdropFilter:"blur(16px)",textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:10}}>🎮</div>
        <h2 style={{color:"#fff",fontSize:24,fontWeight:900,letterSpacing:"0.1em",marginBottom:6}}>YAKKALIK O'YIN</h2>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:24}}>Ismingizni kiriting</p>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&name.trim()&&setPhase("difficulty")}
          placeholder="Ismingiz..." autoFocus

            background:"rgba(255,255,255,0.1)",border:"1px solid rgba(103,232,249,0.4)",
            outline:"none",marginBottom:16,textAlign:"center"}}/>
        <button onClick={()=>name.trim()&&setPhase("difficulty")}
          style={{width:"100%",padding:14,borderRadius:12,fontWeight:900,fontSize:15,
            letterSpacing:"0.1em",cursor:"pointer",border:"none",
            background:"linear-gradient(135deg,#2563eb,#06b6d4)",color:"#fff",
            boxShadow:"0 0 20px rgba(37,99,235,0.4)",marginBottom:12}}>
          DAVOM ETISH →
        </button>
        <button onClick={onBack} style={{width:"100%",padding:"10px",borderRadius:10,
          background:"transparent",border:"1px solid rgba(255,255,255,0.15)",
          color:"rgba(255,255,255,0.5)",fontSize:13,cursor:"pointer",fontWeight:600}}>
          ← Orqaga
        </button>
      </div>
    </div>
  );

  if (phase === "difficulty") return (

// HOST LOBBY — o'yin yaratganda ko'rsatiladi
function HostLobby({ pin, packageName, onStart, onBack }) {
  const [players, setPlayers] = useState([{id:"host",name:"SIZMIZ (Boshlovchi)",isHost:true}]);
  const [started, setStarted] = useState(false);
  const channelRef = useRef(null);

  useEffect(() => {
    const ch = new BroadcastChannel("sigame_room_" + pin);
    channelRef.current = ch;
    ch.onmessage = (e) => {
      const {type, payload} = e.data;
      if (type === "JOIN") {
        setPlayers(prev => {
          if (prev.find(p=>p.id===payload.id)) return prev;
          const updated = [...prev, payload];
          ch.postMessage({type:"ROOM_STATE", payload:{players: updated, packageName}});
          return updated;
        });
      } else if (type === "LEAVE") {
        setPlayers(prev => prev.filter(p=>p.id!==payload.id));
      }
    };
    ch.postMessage({type:"HOST_READY", payload:{pin, packageName}});
    return () => ch.close();
  }, [pin]);

  const startGame = () => {
    channelRef.current?.postMessage({type:"START", payload:{packageName}});
    setStarted(true);
    onStart(players);
  };

  if (started) return null;

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 50%,#071028 100%)",padding:24,position:"relative"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:480}}>
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(103,232,249,0.25)",
          borderRadius:28,padding:32,backdropFilter:"blur(16px)",boxShadow:"0 0 60px rgba(59,130,246,0.2)"}}>

          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",letterSpacing:"0.2em",marginBottom:8}}>XONA PIN-KODI</div>
            <div style={{fontSize:52,fontWeight:900,letterSpacing:"0.35em",color:"#67e8f9",fontFamily:"monospace",
              textShadow:"0 0 30px rgba(103,232,249,0.5)"}}>{pin}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:8}}>
              Boshqalar «PIN-KOD ORQALI KIRISH» → shu kodni kiritsin
            </div>
            <div style={{marginTop:10,padding:"6px 16px",borderRadius:999,display:"inline-block",
              background:"rgba(253,224,71,0.1)",border:"1px solid rgba(253,224,71,0.25)"}}>
              <span style={{color:"#fde047",fontSize:12,fontWeight:700}}>📦 {packageName}</span>
            </div>
          </div>

          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",letterSpacing:"0.15em",
              textTransform:"uppercase",marginBottom:12}}>
              O'yinchilar ({players.length})
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {players.map((p,i)=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,
                  padding:"12px 16px",borderRadius:14,
                  background:p.isHost?"rgba(37,99,235,0.2)":"rgba(255,255,255,0.06)",
                  border:p.isHost?"1px solid rgba(37,99,235,0.4)":"1px solid rgba(255,255,255,0.1)",
                  animation:"fadeUp 0.3s ease"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",
                    justifyContent:"center",fontWeight:900,fontSize:14,
                    background:p.isHost?"rgba(37,99,235,0.5)":"rgba(255,255,255,0.1)",color:"#fff"}}>
                    {i+1}
                  </div>
                  <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{p.name}</span>
                  {p.isHost&&<span style={{marginLeft:"auto",fontSize:11,color:"#60a5fa",fontWeight:700}}>BOSHLOVCHI</span>}
                </div>
              ))}
              {players.length===1&&(
                <div style={{textAlign:"center",padding:"16px",color:"rgba(255,255,255,0.25)",fontSize:13}}>
                  ⏳ Boshqa o'yinchilar kutilmoqda...

  const [players, setPlayers] = useState([]);
  const [gameStarted, setGameStarted] = useState(false);
  const [packageName, setPackageName] = useState("");
  const [myId] = useState("guest_"+Date.now());
  const channelRef = useRef(null);
  const nameRef = useRef(null);

  const handleJoin = () => {
    if (pin.length < 4) { setError("PIN-kod kamida 4 raqam bo'lishi kerak!"); return; }
    setError("");
    setPhase("name");
    setTimeout(()=>nameRef.current?.focus(),100);
  };

  const joinRoom = () => {
    if (!playerName.trim()) { setError("Ismingizni kiriting!"); return; }
    setError("");
    const ch = new BroadcastChannel("sigame_room_" + pin);
    channelRef.current = ch;

    let joinTimeout = setTimeout(() => {
      setError("Xona topilmadi. PIN-kodni tekshiring yoki xona hali ochilmagan.");
      ch.close(); channelRef.current = null;
      setPhase("enter");
    }, 4000);

    ch.onmessage = (e) => {
      const {type, payload} = e.data;
      if (type === "ROOM_STATE") {
        clearTimeout(joinTimeout);
        setPlayers(payload.players || []);
        setPackageName(payload.packageName || "");
        setRoomInfo({pin});
        setPhase("lobby");
      } else if (type === "ROOM_UPDATE") {
        setPlayers(payload.players || []);
      } else if (type === "START") {
        setPackageName(payload.packageName||packageName);
        setGameStarted(true);
        setPhase("playing");
      } else if (type === "HOST_READY") {
        clearTimeout(joinTimeout);
        setPackageName(payload.packageName||"");
        setRoomInfo({pin});
        setPhase("lobby");
      }
    };

    ch.postMessage({type:"JOIN", payload:{id:myId, name:playerName.trim().toUpperCase(), isHost:false}});

    return () => { ch.close(); };
  };

  useEffect(() => {
    return () => {
      if (channelRef.current) {
        channelRef.current.postMessage({type:"LEAVE", payload:{id:myId}});
        channelRef.current.close();
      }
    };
  }, []);

  // PLAYING phase — guest game board
  if (phase === "playing") {
    const allPkgs = loadPackages();
    const pkg = allPkgs.find(p=>p.name===packageName)||allPkgs[0];
    const qs = pkg ? pkg.questions : [];

    return (
      <GuestGameBoard
        questions={qs}
        packageName={packageName}
        playerName={playerName.trim().toUpperCase()}
        players={players}
        channel={channelRef.current}
        myId={myId}
        onBack={onBack}
      />
    );
  }

  if (phase === "lobby") {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
        background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 50%,#071028 100%)",padding:24,position:"relative"}}>
        <Stars/>
        <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:460,
          background:"rgba(255,255,255,0.05)",border:"1px solid rgba(16,185,129,0.3)",
          borderRadius:28,padding:32,backdropFilter:"blur(16px)",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🔗</div>
          <h2 style={{color:"#34d399",fontSize:22,fontWeight:900,marginBottom:4}}>Xonaga ulandi!</h2>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:6}}>PIN: <span style={{color:"#67e8f9",fontWeight:900,letterSpacing:"0.3em"}}>{pin}</span></p>
          {packageName&&<p style={{color:"#fde047",fontSize:13,marginBottom:16}}>📦 {packageName}</p>}
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:20}}>Boshlovchi o'yinni boshlaguncha kuting...</p>

          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {players.map((p,i)=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,
                padding:"10px 14px",borderRadius:12,
                background:p.id===myId?"rgba(16,185,129,0.15)":"rgba(255,255,255,0.05)",
                border:p.id===myId?"1px solid rgba(16,185,129,0.3)":"1px solid rgba(255,255,255,0.08)"}}>
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:12,width:20}}>{i+1}.</span>
                <span style={{color:p.isHost?"#60a5fa":p.id===myId?"#34d399":"#fff",fontWeight:700,fontSize:14,flex:1,textAlign:"left"}}>{p.name}</span>
                {p.isHost&&<span style={{fontSize:11,color:"#60a5fa"}}>BOSHLOVCHI</span>}
                {p.id===myId&&!p.isHost&&<span style={{fontSize:11,color:"#34d399"}}>SIZ</span>}
              </div>
            ))}
            {players.length===0&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:13,padding:12}}>⏳ O'yinchilar yuklanmoqda...</div>}
          </div>

          <button onClick={()=>{
            channelRef.current?.postMessage({type:"LEAVE",payload:{id:myId}});
            channelRef.current?.close();
            channelRef.current=null;
            setPhase("enter"); setPin(""); setError("");
          }} style={{width:"100%",padding:12,borderRadius:12,fontWeight:600,
            background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",
            color:"#f87171",fontSize:13,cursor:"pointer"}}>
            Chiqish
          </button>
        </div>
      </div>
    );
  }

  if (phase === "name") {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
        background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 50%,#071028 100%)",padding:24,position:"relative"}}>
        <Stars/>
        <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:380,
          background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:24,padding:36,backdropFilter:"blur(16px)",textAlign:"center"}}>

// ─── GUEST GAME BOARD (soddalashtirilgan) ─────────────────────
function GuestGameBoard({ questions, packageName, playerName, players, channel, myId, onBack }) {
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [done, setDone] = useState(false);

  const q = questions[idx];

  const check = () => {
    if (!answer.trim() || !q) return;
    const correct = answer.trim().toLowerCase() === q.a.trim().toLowerCase();
    setFeedback(correct?"correct":"wrong");
    if (correct) setScore(s=>s+q.price);
  };

  const next = () => {
    if (idx+1>=questions.length) { setDone(true); return; }
    setIdx(i=>i+1); setAnswer(""); setFeedback(null);
  };

  if (done || questions.length===0) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
        background:"linear-gradient(135deg,#0a0f2e,#0d1b4b,#071028)",padding:24,position:"relative"}}>
        <Stars/>
        <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:400,
          background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:24,padding:36,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:12}}>🏆</div>
          <h2 style={{color:"#fff",fontSize:24,fontWeight:900,marginBottom:6}}>O'YIN TUGADI!</h2>
          <p style={{color:"#67e8f9",fontSize:18,fontWeight:700,marginBottom:20}}>{playerName}</p>
          <div style={{fontSize:52,fontWeight:900,color:"#fde047",marginBottom:24}}>{score} ball</div>
          <button onClick={onBack} style={{width:"100%",padding:14,borderRadius:12,fontWeight:900,
            background:"linear-gradient(135deg,#2563eb,#06b6d4)",border:"none",color:"#fff",fontSize:15,cursor:"pointer"}}>
            ← Bosh menyu
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0f2e,#0d1b4b,#071028)",
      padding:24,position:"relative"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:10,maxWidth:600,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{color:"#67e8f9",fontWeight:900,fontSize:16}}>{playerName}</div>
            <div style={{color:"#fde047",fontWeight:900,fontSize:22}}>{score} ball</div>
          </div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>{idx+1}/{questions.length}</div>
          <button onClick={onBack} style={{padding:"8px 14px",borderRadius:10,background:"rgba(255,255,255,0.07)",
            border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>← Chiqish</button>
        </div>
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(103,232,249,0.2)",
          borderRadius:22,padding:28,marginBottom:18}}>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <span style={{fontSize:12,color:"#67e8f9",fontWeight:700,padding:"3px 12px",borderRadius:999,
              background:"rgba(103,232,249,0.1)"}}>{q.topic}</span>
            <span style={{fontSize:12,color:"#fde047",fontWeight:900,padding:"3px 12px",borderRadius:999,
              background:"rgba(253,224,71,0.1)"}}>{q.price} ball</span>
          </div>
          <p style={{fontSize:20,fontWeight:700,color:"#fff",lineHeight:1.5}}>{q.q}</p>
        </div>
        {!feedback ? (
          <div style={{display:"flex",gap:12}}>
            <input value={answer} onChange={e=>setAnswer(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&check()}
              placeholder="Javobingizni yozing..."
              autoFocus
              style={{flex:1,padding:"16px",borderRadius:14,fontSize:17,color:"#fff",
                background:"rgba(255,255,255,0.1)",border:"2px solid rgba(103,232,249,0.4)",outline:"none"}}/>
            <button onClick={check} disabled={!answer.trim()}
              style={{padding:"16px 22px",borderRadius:14,fontWeight:900,fontSize:15,cursor:"pointer",
                border:"none",background:answer.trim()?"linear-gradient(135deg,#06b6d4,#10b981)":"rgba(255,255,255,0.1)",
                color:"#fff",opacity:answer.trim()?1:0.5}}>
              ➤
            </button>
          </div>
        ) : (
          <div>
            <div style={{textAlign:"center",padding:"20px",borderRadius:18,marginBottom:14,
              background:feedback==="correct"?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.15)",
              border:`1px solid ${feedback==="correct"?"rgba(16,185,129,0.4)":"rgba(239,68,68,0.4)"}`}}>
              <div style={{fontSize:34,marginBottom:6}}>{feedback==="correct"?"✅":"❌"}</div>
              <div style={{fontSize:18,fontWeight:900,color:feedback==="correct"?"#34d399":"#f87171"}}>
                {feedback==="correct"?`+${q.price} ball!`:"Noto'g'ri!"}
              </div>
              {feedback!=="correct"&&<div style={{color:"rgba(255,255,255,0.6)",fontSize:14,marginTop:6}}>
                To'g'ri javob: <span style={{color:"#67e8f9",fontWeight:700}}>{q.a}</span>

            </div>
            <button onClick={next} style={{width:"100%",padding:16,borderRadius:14,fontWeight:900,
              fontSize:16,cursor:"pointer",border:"none",background:"linear-gradient(135deg,#2563eb,#06b6d4)",color:"#fff"}}>
              {idx+1>=questions.length?"🏁 NATIJALAR":"KEYINGI →"}
            </button>
          </div>
        )}
        <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:16,flexWrap:"wrap"}}>
          {questions.map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",
              background:i<idx?"rgba(103,232,249,0.6)":i===idx?"#67e8f9":"rgba(255,255,255,0.15)"}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── EDITOR SCREEN ────────────────────────────────────────────
function EditorScreen({ onBack }) {
  const [packages, setPackages] = useState(()=>loadPackages());
  const [activePkgId, setActivePkgId] = useState(()=>{ const p=loadPackages(); return p[0]?.id||"default"; });
  const [form, setForm] = useState({topic:"",q:"",a:"",price:100});
  const [editing, setEditing] = useState(null);
  const [saved, setSaved] = useState(false);
  const [newPkgName, setNewPkgName] = useState("");
  const [showNewPkg, setShowNewPkg] = useState(false);
  const [importError, setImportError] = useState("");
  const fileRef = useRef(null);

  // ── JSON EXPORT ──
  const exportPackage = (pkg) => {
    const data = JSON.stringify({
      sigame_package: true,
      version: 1,
      name: pkg.name,
      questions: pkg.questions
    }, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = pkg.name.replace(/\s+/g,"_") + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportAll = () => {
    const data = JSON.stringify({sigame_package:true,version:1,name:"Barcha paketlar",packages}, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "sigame_barcha_paketlar.json"; a.click();
    URL.revokeObjectURL(url);
  };

  // ── JSON IMPORT ──
  const importFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const json = JSON.parse(ev.target.result);
        if (!json.sigame_package) { setImportError("Bu SIGame fayli emas!"); return; }
        let imported = [];
        if (json.packages && Array.isArray(json.packages)) {
          imported = json.packages;
        } else if (json.questions && Array.isArray(json.questions)) {
          imported = [{id:"imp_"+Date.now(), name: json.name||file.name.replace(".json",""), questions: json.questions}];
        } else { setImportError("Fayl formati noto'g'ri!"); return; }
        const current = loadPackages();
        // Merge: avoid duplicate names
        const merged = [...current];
        imported.forEach(imp => {
          const exists = merged.findIndex(p=>p.name===imp.name);
          if (exists>=0) {
            merged[exists] = {...imp, id: merged[exists].id};
          } else {
            merged.push({...imp, id:"imp_"+Date.now()+"_"+Math.random().toString(36).slice(2)});
          }
        });
        setPackages(merged);
        savePackages(merged);
        setActivePkgId(imported[imported.length-1]?.id || merged[merged.length-1]?.id);
        setImportError("");
        setSaved(true);
        setTimeout(()=>setSaved(false),3000);
      } catch(err) {
        setImportError("Faylni o'qishda xatolik: " + err.message);
      }
    };
    reader.readAsText(file);
  };

  const activePkg = packages.find(p=>p.id===activePkgId) || packages[0];
  const questions = activePkg ? activePkg.questions : [];

  const updatePkg = (pkgId, newQuestions) => {
    const updated = packages.map(p=>p.id===pkgId?{...p,questions:newQuestions}:p);
    setPackages(updated);
    savePackages(updated);
  };

  const createPackage = () => {
    if (!newPkgName.trim()) return;
    const newPkg = {id:"pkg_"+Date.now(), name:newPkgName.trim(), questions:[]};
    const updated = [...packages, newPkg];
    setPackages(updated);
    savePackages(updated);
    setActivePkgId(newPkg.id);
    setNewPkgName("");
    setShowNewPkg(false);
  };

  const deletePackage = (pkgId) => {
    if (packages.length<=1) { alert("Kamida bitta paket bo'lishi kerak!"); return; }
    if (!window.confirm("Bu paketni o'chirasizmi?")) return;
    const updated = packages.filter(p=>p.id!==pkgId);
    setPackages(updated);
    savePackages(updated);
    setActivePkgId(updated[0].id);
  };

  const save = () => {
    if (!form.topic||!form.q||!form.a) return;
    let updated;
    if (editing!==null) {
      updated = questions.map(x=>x.id===editing?{...form,id:editing}:x);
      setEditing(null);
    } else {
      updated = [...questions,{...form,id:Date.now()}];
    }
    updatePkg(activePkgId, updated);
    setForm({topic:"",q:"",a:"",price:100});
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const deleteQ = (id) => {
    const updated = questions.filter(x=>x.id!==id);
    updatePkg(activePkgId, updated);
  };

  const resetToDefault = () => {
    if (!window.confirm("Standart paketni tiklaysizmi?")) return;
    const updated = packages.map(p=>p.id==="default"?{...p,questions:DEFAULT_QUESTIONS}:p);
    const hasDefault = packages.find(p=>p.id==="default");
    const final = hasDefault ? updated : [{...DEFAULT_PACKAGE}, ...updated];
    setPackages(final);
    savePackages(final);
    setActivePkgId("default");
    setEditing(null);
    setForm({topic:"",q:"",a:"",price:100});
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0f2e 0%,#0d1b4b 50%,#071028 100%)",
      padding:24,position:"relative"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:10,maxWidth:700,margin:"0 auto",paddingTop:10}}>
        {/* Hidden file input */}
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importFile}/>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={onBack} style={{padding:"10px 18px",borderRadius:10,background:"rgba(255,255,255,0.07)",
            border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.7)",fontSize:13,cursor:"pointer",fontWeight:600}}>
            ← Orqaga
          </button>
          <div style={{flex:1}}>
            <h2 style={{color:"#fff",fontSize:20,fontWeight:900,letterSpacing:"0.08em"}}>✏️ SAVOL MUHARRIRI</h2>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:2}}>{packages.length} ta paket · {questions.length} ta savol</p>
          </div>
          <button onClick={()=>fileRef.current?.click()}
            style={{padding:"8px 14px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
              background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.35)",color:"#34d399"}}>
            📥 JSON yuklash
          </button>
          <button onClick={()=>activePkg&&exportPackage(activePkg)}
            style={{padding:"8px 14px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
              background:"rgba(37,99,235,0.15)",border:"1px solid rgba(37,99,235,0.35)",color:"#60a5fa"}}>
            📤 Eksport
          </button>
          <button onClick={resetToDefault}
            style={{padding:"8px 14px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
              background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171"}}>
            🔄 Reset
          </button>
        </div>
        {importError&&(
          <div style={{marginBottom:10,padding:"10px 14px",borderRadius:10,
            background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",fontSize:13}}>
            ⚠️ {importError}
          </div>
        )}

        {/* Package selector */}
        <div style={{marginBottom:20,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(103,232,249,0.15)",
          borderRadius:16,padding:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <span style={{color:"#67e8f9",fontWeight:900,fontSize:13,letterSpacing:"0.1em"}}>📦 PAKETLAR</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={exportAll}
                style={{padding:"5px 10px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",
                  background:"rgba(37,99,235,0.15)",border:"1px solid rgba(37,99,235,0.3)",color:"#60a5fa"}}>
                📤 Hammasini eksport
              </button>
              <button onClick={()=>setShowNewPkg(p=>!p)}
                style={{padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",
                  background:"rgba(16,185,129,0.2)",border:"1px solid rgba(16,185,129,0.4)",color:"#34d399"}}>
                ➕ Yangi paket
              </button>
            </div>
          </div>
          {showNewPkg&&(
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input value={newPkgName} onChange={e=>setNewPkgName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&createPackage()}
                placeholder="Paket nomi (masalan: Matematika olimpiadasi)"
                style={{flex:1,padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.08)",
                  border:"1px solid rgba(103,232,249,0.4)",color:"#fff",fontSize:13,outline:"none"}}/>
              <button onClick={createPackage}
                style={{padding:"10px 16px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",
                  background:"linear-gradient(135deg,#2563eb,#06b6d4)",border:"none",color:"#fff"}}>
                Yaratish
              </button>
            </div>
          )}
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {packages.map(pkg=>(
              <div key={pkg.id} style={{display:"flex",alignItems:"center",gap:5,
                padding:"6px 12px",borderRadius:999,cursor:"pointer",
                background:activePkgId===pkg.id?"rgba(37,99,235,0.35)":"rgba(255,255,255,0.06)",
                border:activePkgId===pkg.id?"1px solid rgba(59,130,246,0.6)":"1px solid rgba(255,255,255,0.12)",
                transition:"all 0.2s"}}
                onClick={()=>{setActivePkgId(pkg.id);setEditing(null);setForm({topic:"",q:"",a:"",price:100});}}>
                <span style={{color:activePkgId===pkg.id?"#fff":"rgba(255,255,255,0.6)",fontSize:12,fontWeight:700}}>{pkg.name}</span>
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>({pkg.questions.length})</span>
                <button onClick={e=>{e.stopPropagation();exportPackage(pkg);}}
                  style={{background:"none",border:"none",color:"rgba(96,165,250,0.7)",cursor:"pointer",fontSize:12,lineHeight:1,padding:"0 1px"}}
                  title="Eksport">📤</button>
                {pkg.id!=="default"&&(
                  <button onClick={e=>{e.stopPropagation();deletePackage(pkg.id);}}
                    style={{background:"none",border:"none",color:"rgba(239,68,68,0.6)",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</button>
                )}
              </div>
            ))}
          </div>
        </div>

        {saved&&(
          <div style={{marginBottom:14,padding:"12px 18px",borderRadius:12,
            background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.4)",
            color:"#34d399",fontWeight:700,fontSize:14,textAlign:"center",animation:"fadeUp 0.3s ease"}}>
            ✅ Muvaffaqiyatli yuklandi / saqlandi!
          </div>
        )}

        {/* Form */}
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(103,232,249,0.2)",
          borderRadius:18,padding:22,marginBottom:20}}>
          <h3 style={{color:"#67e8f9",fontSize:13,fontWeight:900,letterSpacing:"0.2em",
            textTransform:"uppercase",marginBottom:16}}>
            {editing!==null?"✏️ Savolni tahrirlash":"➕ Yangi savol qo'shish"} — <span style={{color:"#fde047"}}>{activePkg?.name}</span>
          </h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <input placeholder="Mavzu (masalan: Tarix)" value={form.topic}
              onChange={e=>setForm(p=>({...p,topic:e.target.value}))}
              style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.08)",
                border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontSize:13,outline:"none"}}/>
            <select value={form.price} onChange={e=>setForm(p=>({...p,price:Number(e.target.value)}))}
              style={{padding:"11px 14px",borderRadius:10,background:"#0d1b4b",
                border:"1px solid rgba(255,255,255,0.15)",color:"#fde047",fontSize:13,outline:"none",fontWeight:700}}>
              {[100,200,300,400,500].map(v=><option key={v} value={v}>{v} ball</option>)}
            </select>
          </div>
          <input placeholder="Savol matni..." value={form.q}
            onChange={e=>setForm(p=>({...p,q:e.target.value}))}
            style={{width:"100%",padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.08)",
              border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontSize:13,outline:"none",marginBottom:12}}/>
          <input placeholder="To'g'ri javob..." value={form.a}
            onChange={e=>setForm(p=>({...p,a:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&save()}
            style={{width:"100%",padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.08)",
              border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontSize:13,outline:"none",marginBottom:14}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={save} style={{flex:1,padding:"12px",borderRadius:10,fontWeight:900,
              fontSize:14,cursor:"pointer",border:"none",
              background:"linear-gradient(135deg,#2563eb,#06b6d4)",color:"#fff"}}>
              {editing!==null?"💾 Saqlash":"➕ Qo'shish"}
            </button>
            {editing!==null&&(
              <button onClick={()=>{setEditing(null);setForm({topic:"",q:"",a:"",price:100});}}
                style={{padding:"12px 18px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",
                  border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.6)"}}>
                Bekor qilish
              </button>
            )}
          </div>
        </div>

        {/* Question list */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {questions.map((qn)=>(
            <div key={qn.id} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",
              borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:900,padding:"3px 10px",borderRadius:999,
                background:"rgba(253,224,71,0.15)",color:"#fde047",border:"1px solid rgba(253,224,71,0.3)",flexShrink:0}}>
                {qn.price}
              </span>
              <span style={{fontSize:12,color:"#67e8f9",fontWeight:700,flexShrink:0}}>{qn.topic}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:3,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{qn.q}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>✓ {qn.a}</div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>{setEditing(qn.id);setForm({topic:qn.topic,q:qn.q,a:qn.a,price:qn.price});}}
                  style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
                    background:"rgba(37,99,235,0.2)",border:"1px solid rgba(37,99,235,0.4)",color:"#60a5fa"}}>
                  ✏️
                </button>
                <button onClick={()=>deleteQ(qn.id)}
                  style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
                    background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171"}}>
                  🗑️
                </button>
              </div>
            </div>
          ))}
          {questions.length===0&&(
            <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:14,padding:"32px 0"}}>
              Hali savol yo'q. Yuqorida yangi savol qo'shing!
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("menu");
  const [showModal, setShowModal] = useState(false);
  const [created, setCreated] = useState(null);
  const [selectedPackageName, setSelectedPackageName] = useState("");
  const [hostPin, setHostPin] = useState(null);
  const [hostPlayers, setHostPlayers] = useState([]);

  return (
    <>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.6;}}
        @keyframes pulseGlow{0%,100%{box-shadow:0 0 25px rgba(59,130,246,0.35);}50%{box-shadow:0 0 50px rgba(59,130,246,0.65);}}
        @keyframes buzzPulse{0%,100%{box-shadow:0 0 50px rgba(239,68,68,0.7);}50%{box-shadow:0 0 80px rgba(239,68,68,1);}}
        @keyframes sendPulse{0%,100%{box-shadow:0 0 20px rgba(16,185,129,0.5);}50%{box-shadow:0 0 40px rgba(16,185,129,0.85);}}
        @keyframes neonFlash{0%,100%{border-color:rgba(239,68,68,0.4);box-shadow:0 0 20px rgba(239,68,68,0.2);}50%{border-color:rgba(249,115,22,1);box-shadow:0 0 40px rgba(249,115,22,0.6);}}
        .si-btn-open{padding:14px 26px;border-radius:14px;background:rgba(37,99,235,0.8);color:#fff;font-size:14px;font-weight:900;letter-spacing:0.12em;border:none;cursor:pointer;animation:pulseGlow 2s infinite;transition:background 0.2s;}
        .si-btn-open:hover{background:#3b82f6;}
        .si-btn-send{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:14px 22px;border-radius:14px;background:linear-gradient(135deg,#06b6d4 0%,#10b981 100%);color:#fff;font-size:14px;font-weight:900;letter-spacing:0.1em;border:none;cursor:pointer;animation:sendPulse 1.8s infinite;transition:transform 0.15s,opacity 0.2s;white-space:nowrap;}
        .si-btn-send:hover:not(:disabled){transform:scale(1.05);}
        .si-btn-send:disabled{background:linear-gradient(135deg,#374151,#4b5563);animation:none;box-shadow:none;cursor:not-allowed;opacity:0.6;}
        .si-buzzer{width:170px;height:170px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#991b1b);color:#fff;font-size:22px;font-weight:900;letter-spacing:0.15em;border:none;cursor:pointer;animation:buzzPulse 1.5s infinite;transition:transform 0.15s;}
        .si-buzzer:hover:not(:disabled){transform:scale(1.06);}
        .si-buzzer:disabled{background:linear-gradient(135deg,#6b7280,#374151);animation:none;box-shadow:none;cursor:not-allowed;}
        .slider-thumb{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;width:100%;}
        .slider-thumb::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f59e0b;border:2px solid #fff;cursor:pointer;box-shadow:0 0 8px rgba(245,158,11,0.7);}
        .slider-thumb::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#f59e0b;border:2px solid #fff;cursor:pointer;}
      `}</style>

      {screen === "menu" && (
        <MainMenu onAction={(a)=>{
          if(a==="online"){setShowModal(true);}
          else if(a==="solo"){setScreen("solo");}
          else if(a==="pin"){setScreen("pin");}
          else if(a==="help"){setScreen("help");}
          else if(a==="editor"){setScreen("editor");}
        }}/>
      )}
      {screen === "lobby" && hostPin && (
        <HostLobby
          pin={hostPin}
          packageName={selectedPackageName}
          onBack={()=>{setScreen("menu");setHostPin(null);}}
          onStart={(players)=>{
            setHostPlayers(players);
            setScreen("game");
          }}
        />
      )}
      {screen === "game" && <GameBoard onBack={()=>setScreen("menu")} selectedPackageName={selectedPackageName} hostPlayers={hostPlayers}/>}
      {screen === "solo" && <SoloScreen onBack={()=>setScreen("menu")}/>}
      {screen === "pin" && <PinScreen onBack={()=>setScreen("menu")}/>}
      {screen === "help" && <HelpScreen onBack={()=>setScreen("menu")}/>}
      {screen === "editor" && <EditorScreen onBack={()=>setScreen("menu")}/>}

      {showModal && (
        <RoomSettingsModal
          onClose={()=>setShowModal(false)}
          onCreate={(s)=>{
            const pin = generatePin();
            setCreated(s);
            setSelectedPackageName(s.questionPackage);
            setHostPin(pin);
            setShowModal(false);
            setScreen("lobby");
          }}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
